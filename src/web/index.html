<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>tmuxifier</title>
    <link rel="icon" type="image/png" href="./assets/tmuxifier-logo.png" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="app"></div>
    <div id="provision-panel" class="provision-panel">
      <div class="provision-header">
        <span class="provision-title"></span>
        <span class="provision-status"></span>
        <button class="provision-close" style="display:none">&#x2715;</button>
      </div>
      <div class="provision-term"></div>
    </div>
    <div id="fleet-panel" class="fleet-panel">
      <div class="fleet-panel-header">
        <span class="fleet-panel-title">Fleet jobs</span>
        <button class="fleet-panel-close" title="Close">&#x2715;</button>
      </div>
      <div class="fleet-panel-body">
        <ul class="fleet-history"></ul>
        <div class="fleet-detail"></div>
      </div>
    </div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
